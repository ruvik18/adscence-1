kind = "web"
previewPath = "/"
title = "ResuméInspo — Resume Inspiration & Blog"
version = "1.0.0"
id = "artifacts/resume-inspire"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23524

[services.development]
run = "pnpm --filter @workspace/resume-inspire run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resume-inspire", "run", "build" ]
publicDir = "artifacts/resume-inspire/out"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23524"
BASE_PATH = "/"
